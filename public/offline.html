<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lisani — Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1A3A5C;
      color: #ffffff;
      font-family: system-ui, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: #F5A623; }
    p { font-size: 16px; opacity: 0.85; line-height: 1.6; max-width: 320px; }
    .arabic {
      font-size: 48px;
      margin: 24px 0;
      direction: rtl;
      font-family: 'Noto Naskh Arabic', serif;
    }
    button {
      margin-top: 32px;
      padding: 14px 32px;
      background: #F5A623;
      color: #1A3A5C;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      min-height: 48px;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>Tu es hors ligne</h1>
  <p>Vérifie ta connexion internet pour continuer à apprendre l'arabe.</p>
  <div class="arabic">ٱلسَّلَامُ عَلَيْكُمْ</div>
  <p>Les leçons déjà vues sont disponibles sans internet !</p>
  <button onclick="window.location.reload()">Réessayer</button>
</body>
</html>
